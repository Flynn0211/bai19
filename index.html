<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game - Premium Edition</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-front-bg: rgba(255, 255, 255, 0.05);
            --card-front-border: rgba(255, 255, 255, 0.1);
            --card-back-bg: linear-gradient(135deg, #6366f1, #a855f7);
            --glass-bg: rgba(15, 23, 42, 0.7);
            --primary-glow: rgba(99, 102, 241, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        .stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1rem;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            border: 1px solid var(--card-front-border);
        }

        .stats span {
            color: #c084fc;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            perspective: 1000px;
            z-index: 10;
        }

        @media (min-width: 600px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
            }
        }

        .card {
            width: 100px;
            height: 140px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 16px;
        }

        @media (min-width: 600px) {
            .card {
                width: 120px;
                height: 160px;
            }
        }

        /* Hover effect only for non-flipped cards */
        .card:not(.flipped):hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 25px -5px var(--primary-glow);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            font-size: 3rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.3s ease;
        }

        .card-front {
            background: var(--card-front-bg);
            border: 1px solid var(--card-front-border);
            backdrop-filter: blur(10px);
            /* Question mark styling */
            color: rgba(255, 255, 255, 0.5);
            font-weight: bold;
        }

        .card-front::after {
            content: '?';
            font-size: 2.5rem;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-back {
            background: var(--card-back-bg);
            transform: rotateY(180deg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* Soft glow when revealed */
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.2), 0 0 15px var(--primary-glow);
        }

        .card.matched .card-back {
            background: linear-gradient(135deg, #10b981, #34d399);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.3), 0 0 20px rgba(16, 185, 129, 0.5);
            animation: pulse-match 1s ease;
        }

        @keyframes pulse-match {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .controls {
            margin-top: 2rem;
            z-index: 10;
        }

        .btn-reset {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
            font-family: inherit;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.6);
            background: linear-gradient(135deg, #4338ca, #6d28d9);
        }

        .btn-reset:active {
            transform: translateY(1px);
        }

        /* Modal / Toast for Winning */
        .win-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
        }

        .win-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .win-modal {
            background: var(--glass-bg);
            border: 1px solid var(--card-front-border);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .win-modal-overlay.active .win-modal {
            transform: translateY(0) scale(1);
        }

        .win-modal h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .win-modal p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #cbd5e1;
        }

        /* Decorative Background elements */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: #4f46e5;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: #a855f7;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -50px); }
            66% { transform: translate(-20px, 20px); }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header>
        <h1>Memory Game</h1>
        <div class="stats">
            <div>Moves: <span id="moves-count">0</span></div>
            <div>Pairs Found: <span id="pairs-count">0</span> / 4</div>
        </div>
    </header>

    <main class="game-board" id="game-board">
        <!-- Cards will be generated by JS -->
    </main>

    <div class="controls">
        <button class="btn-reset" id="reset-btn">Restart Game</button>
    </div>

    <!-- Win Modal -->
    <div class="win-modal-overlay" id="win-modal">
        <div class="win-modal">
            <h2>You Won! 🎉</h2>
            <p>You completed the game in <span id="final-moves" style="color: #fff; font-weight: bold;">0</span> moves.</p>
            <button class="btn-reset" id="modal-reset-btn">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const board = document.getElementById('game-board');
            const movesDisplay = document.getElementById('moves-count');
            const pairsDisplay = document.getElementById('pairs-count');
            const resetBtn = document.getElementById('reset-btn');
            const modalResetBtn = document.getElementById('modal-reset-btn');
            const winModal = document.getElementById('win-modal');
            const finalMovesDisplay = document.getElementById('final-moves');

            // 4 pairs of premium emojis/icons
            const cardsArray = [
                '🚀', '🚀',
                '🌟', '🌟',
                '🎸', '🎸',
                '💎', '💎'
            ];

            let cards = [];
            let hasFlippedCard = false;
            let lockBoard = false;
            let firstCard, secondCard;
            let moves = 0;
            let matchedPairs = 0;

            function initGame() {
                // Reset state
                board.innerHTML = '';
                hasFlippedCard = false;
                lockBoard = false;
                firstCard = null;
                secondCard = null;
                moves = 0;
                matchedPairs = 0;
                movesDisplay.textContent = moves;
                pairsDisplay.textContent = matchedPairs;
                winModal.classList.remove('active');

                // Shuffle array
                const shuffledCards = [...cardsArray].sort(() => 0.5 - Math.random());

                // Create cards
                shuffledCards.forEach((icon, index) => {
                    const cardElement = document.createElement('div');
                    cardElement.classList.add('card');
                    cardElement.dataset.icon = icon;
                    cardElement.dataset.index = index;

                    cardElement.innerHTML = `
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">${icon}</div>
                    `;

                    cardElement.addEventListener('click', flipCard);
                    board.appendChild(cardElement);
                });
            }

            function flipCard() {
                if (lockBoard) return;
                if (this === firstCard) return; // Prevent double clicking same card

                this.classList.add('flipped');

                if (!hasFlippedCard) {
                    // First click
                    hasFlippedCard = true;
                    firstCard = this;
                    return;
                }

                // Second click
                secondCard = this;
                updateMoves();
                checkForMatch();
            }

            function checkForMatch() {
                // Do cards match?
                let isMatch = firstCard.dataset.icon === secondCard.dataset.icon;

                isMatch ? disableCards() : unflipCards();
            }

            function disableCards() {
                firstCard.removeEventListener('click', flipCard);
                secondCard.removeEventListener('click', flipCard);
                
                // Add matched styling
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');

                matchedPairs++;
                pairsDisplay.textContent = matchedPairs;

                resetBoard();

                if (matchedPairs === 4) {
                    setTimeout(showWinModal, 500);
                }
            }

            function unflipCards() {
                lockBoard = true;

                setTimeout(() => {
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    resetBoard();
                }, 1000); // 1 second delay to see the cards
            }

            function resetBoard() {
                [hasFlippedCard, lockBoard] = [false, false];
                [firstCard, secondCard] = [null, null];
            }

            function updateMoves() {
                moves++;
                movesDisplay.textContent = moves;
            }

            function showWinModal() {
                finalMovesDisplay.textContent = moves;
                winModal.classList.add('active');
            }

            // Event Listeners for reset
            resetBtn.addEventListener('click', initGame);
            modalResetBtn.addEventListener('click', initGame);

            // Start game initially
            initGame();
        });
    </script>
</body>
</html>
